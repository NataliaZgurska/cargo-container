<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cargo-Container</title>
    
    
     
    

    <script type="module" crossorigin src="/cargo-container/commonHelpers.js"></script>
    <link rel="stylesheet" href="/cargo-container/assets/index-42f1f1ed.css">
  </head>
  <body>
    <div class="main-container">

<div class="title-back-wrap">
      <h1 class="cargo-title">Контейнер з фруктами</h1>
            
</div>


      <div class="cargo-message-clearform-wrap">
        <div class="cargo-messages-backdrop">
          <p class="cargo-message">Контейнер = 50 куб.метрів;</p>
          <p class="cargo-message">1 ящик = 1 куб.метр</p>
        </div>

        <div class="clearform js-clearform">
          <a class="clearform-link" href="">
            <svg class="clearform-icon" width="20" height="20">
              <use href="/cargo-container/assets/icons-6d9c5024.svg#icon-loop2"></use>
            </svg>
          </a>
        </div>
      </div>

      <form class="cargo-form">
        <div class="form-label-inputs">
          <label class="form-label">
            Яблука
            <div class="input-wrap">
              <input type="number" name="apples" class="form-input" />
              <img
                class="input-img"
                src="/cargo-container/assets/apple-688e882e.jpg"
                alt="small-apple"
                width="30"
                height="30"
              />
            </div>
          </label>

          <label class="form-label">
            Виноград
            <div class="input-wrap">
              <input type="number" name="grapes" class="form-input" />
              <img
                class="input-img"
                src="/cargo-container/assets/grape-e08af5f5.jpg"
                alt="small-grape"
                width="30"
                height="30"
              />
            </div>
          </label>

          <label class="form-label">
            Банани

            <div class="input-wrap">
              <input type="number" name="bananas" class="form-input" />
              <img
                class="input-img"
                src="/cargo-container/assets/banana-b2375553.jpg"
                alt="small-banana"
                width="30"
                height="30"
              />
            </div>
          </label>
        </div>

        <button type="submit" class="form-btn">Завантажуємо</button>
      </form>

      <div class="text-container">
        <p class="text">Ви можете завантажити не більше 50 ящиків</p>
      </div>

      
          <div class="container-big">
            <div class="container-img"></div>
          </div>
        
    <button type="button" class="sending-btn">Відправляємо</button>
   
    
  </body>
</html>
